<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lumen Studio — Prompt Generator</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,400&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #0c0c0e;
      --panel: #16161a;
      --panel-2: #1c1c22;
      --border: rgba(255,255,255,0.08);
      --text: #f4f1ea;
      --muted: #8b8794;
      --gold: #c9a227;
      --gold-soft: rgba(201,162,39,0.18);
      --orange: #e8923a;
      --radius: 20px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      background:
        radial-gradient(ellipse 80% 50% at 50% -10%, rgba(201,162,39,0.08), transparent 55%),
        var(--bg);
      color: var(--text);
      font-family: "DM Sans", system-ui, sans-serif;
      line-height: 1.5;
    }
    .shell {
      max-width: 920px;
      margin: 0 auto;
      min-height: 100vh;
      padding: 2rem 1.25rem 8.5rem;
      display: flex;
      flex-direction: column;
    }
    .top {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 1rem;
      margin-bottom: 1.75rem;
    }
    .top h1 {
      font-family: "Instrument Serif", Georgia, serif;
      font-size: clamp(2.2rem, 5vw, 3.25rem);
      font-weight: 400;
      letter-spacing: -0.02em;
      line-height: 1.1;
    }
    .top .sub {
      margin-top: 0.45rem;
      color: var(--muted);
      font-size: 0.92rem;
    }
    .top .sub a { color: var(--text); text-decoration: none; border-bottom: 1px solid var(--border); }
    .top .sub a:hover { color: var(--gold); }
    .credits {
      color: var(--muted);
      font-size: 0.9rem;
      white-space: nowrap;
      padding-top: 0.35rem;
    }

    .stage {
      flex: 1;
      min-height: 280px;
      border-radius: var(--radius);
      border: 1px solid var(--border);
      background: linear-gradient(180deg, rgba(255,255,255,0.02), transparent);
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
    }
    .empty {
      text-align: center;
      color: var(--muted);
      padding: 2rem;
    }
    .empty .spark {
      font-size: 1.75rem;
      opacity: 0.55;
      margin-bottom: 0.75rem;
      letter-spacing: 0.35rem;
    }
    .results {
      display: none;
      width: 100%;
      height: 100%;
      overflow-y: auto;
      padding: 1.25rem;
    }
    .results.show { display: block; }
    .result-card {
      border: 1px solid var(--border);
      background: var(--panel);
      border-radius: 16px;
      margin-bottom: 0.85rem;
      overflow: hidden;
    }
    .result-card header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 0.75rem;
      padding: 0.85rem 1rem;
      border-bottom: 1px solid var(--border);
      background: rgba(255,255,255,0.02);
    }
    .result-card header h3 {
      font-size: 0.85rem;
      font-weight: 600;
      letter-spacing: 0.01em;
    }
    .result-card header .hint {
      color: var(--muted);
      font-size: 0.72rem;
      font-weight: 400;
      margin-left: 0.4rem;
    }
    .copy-btn {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text);
      border-radius: 999px;
      padding: 0.35rem 0.8rem;
      font-size: 0.75rem;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
    }
    .copy-btn:hover { border-color: var(--gold); color: var(--gold); }
    .result-card pre {
      padding: 1rem;
      white-space: pre-wrap;
      word-break: break-word;
      font-family: ui-monospace, "Cascadia Code", Consolas, monospace;
      font-size: 0.78rem;
      line-height: 1.55;
      color: #e8e4dc;
      max-height: 240px;
      overflow-y: auto;
    }

    .composer {
      position: fixed;
      left: 50%;
      transform: translateX(-50%);
      bottom: 1.25rem;
      width: min(920px, calc(100% - 1.5rem));
      background: rgba(22,22,26,0.92);
      backdrop-filter: blur(18px);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 1rem 1.1rem 1.05rem;
      box-shadow: 0 20px 60px rgba(0,0,0,0.45);
      z-index: 40;
    }
    .tabs {
      display: flex;
      gap: 1.25rem;
      margin-bottom: 0.85rem;
      border-bottom: 1px solid var(--border);
      padding-bottom: 0.55rem;
      overflow-x: auto;
    }
    .tab {
      background: none;
      border: none;
      color: var(--muted);
      font: inherit;
      font-size: 0.88rem;
      font-weight: 500;
      cursor: pointer;
      padding: 0.2rem 0;
      position: relative;
      white-space: nowrap;
    }
    .tab.active { color: var(--text); }
    .tab.active::after {
      content: "";
      position: absolute;
      left: 0; right: 0; bottom: -0.6rem;
      height: 2px;
      background: var(--text);
      border-radius: 2px;
    }
    .composer-row {
      display: grid;
      grid-template-columns: 56px 1fr auto;
      gap: 0.75rem;
      align-items: start;
    }
    .attach {
      width: 56px;
      height: 56px;
      border-radius: 14px;
      border: 1px dashed var(--border);
      background: var(--panel-2);
      display: grid;
      place-items: center;
      color: var(--muted);
      font-size: 1.4rem;
      cursor: default;
    }
    #idea {
      width: 100%;
      min-height: 56px;
      max-height: 140px;
      resize: vertical;
      background: transparent;
      border: none;
      color: var(--text);
      font: inherit;
      font-size: 0.95rem;
      outline: none;
      padding: 0.65rem 0.2rem;
    }
    #idea::placeholder { color: var(--muted); }
    .wand {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      border: none;
      background: var(--orange);
      color: white;
      font-size: 1.1rem;
      cursor: pointer;
      margin-top: 0.3rem;
      box-shadow: 0 8px 24px rgba(232,146,58,0.35);
    }
    .wand:hover { filter: brightness(1.08); }
    .controls {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 0.55rem;
      margin-top: 0.85rem;
    }
    .pill {
      appearance: none;
      background: var(--panel-2);
      border: 1px solid var(--border);
      color: var(--text);
      border-radius: 999px;
      padding: 0.55rem 0.9rem;
      font: inherit;
      font-size: 0.82rem;
      cursor: pointer;
    }
    .pill:hover { border-color: rgba(255,255,255,0.18); }
    .spacer { flex: 1; }
    .generate {
      border: none;
      border-radius: 999px;
      padding: 0.7rem 1.2rem;
      font: inherit;
      font-size: 0.9rem;
      font-weight: 600;
      color: var(--text);
      cursor: pointer;
      background: linear-gradient(180deg, rgba(255,255,255,0.14), rgba(255,255,255,0.06));
      border: 1px solid rgba(255,255,255,0.12);
      display: inline-flex;
      align-items: center;
      gap: 0.45rem;
    }
    .generate:hover { background: linear-gradient(180deg, rgba(201,162,39,0.35), rgba(201,162,39,0.18)); border-color: rgba(201,162,39,0.45); }
    .footer-note {
      margin-top: 0.7rem;
      color: var(--muted);
      font-size: 0.75rem;
      text-align: center;
    }
    .toast {
      position: fixed;
      bottom: 9.5rem;
      left: 50%;
      transform: translateX(-50%) translateY(8px);
      background: var(--gold);
      color: #1a1408;
      font-weight: 600;
      font-size: 0.82rem;
      padding: 0.55rem 1rem;
      border-radius: 999px;
      opacity: 0;
      pointer-events: none;
      transition: 0.2s ease;
      z-index: 50;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
    @media (max-width: 640px) {
      .composer-row { grid-template-columns: 48px 1fr auto; }
      .attach { width: 48px; height: 48px; }
      .spacer { display: none; }
      .generate { width: 100%; justify-content: center; margin-top: 0.25rem; }
      .controls { gap: 0.4rem; }
    }
  </style>
</head>
<body>
  <div class="shell">
    <div class="top">
      <div>
        <h1>Generate Package</h1>
        <p class="sub">
          <a href="/account">← Library</a>
          · Suno + cover + YouTube kit in one pass
        </p>
      </div>
      <div class="credits" id="packCount">Ready</div>
    </div>

    <div class="stage" id="stage">
      <div class="empty" id="emptyState">
        <div class="spark">✦ ✦ ✦</div>
        <p>Your generations will appear here.</p>
      </div>
      <div class="results" id="results"></div>
    </div>
  </div>

  <div class="composer">
    <div class="tabs" role="tablist">
      <button class="tab active" data-mode="full" type="button">Full package</button>
      <button class="tab" data-mode="suno" type="button">Suno only</button>
      <button class="tab" data-mode="visual" type="button">Visuals only</button>
      <button class="tab" data-mode="youtube" type="button">YouTube only</button>
    </div>

    <div class="composer-row">
      <div class="attach" title="Optional vibe seed">+</div>
      <textarea id="idea" rows="2" placeholder="Describe the track — e.g. soft rain + warm pads for deep sleep, no vocals…"></textarea>
      <button class="wand" type="button" title="Surprise idea" onclick="surpriseIdea()">✧</button>
    </div>

    <div class="controls">
      <select class="pill" id="vibe" title="Vibe">
        <option value="sleep">Deep sleep</option>
        <option value="cortisol">Nervous system reset</option>
        <option value="chamber">Dark chamber · cello</option>
        <option value="neo">Neoclassical</option>
        <option value="focus">Focus / study</option>
        <option value="cosmic">Cosmic ambient</option>
      </select>
      <select class="pill" id="runtime" title="Runtime">
        <option value="8h">8 hour video</option>
        <option value="3h">3 hour video</option>
        <option value="1h">1 hour video</option>
        <option value="8m">~8 min loop segment</option>
      </select>
      <div class="spacer"></div>
      <button class="generate" type="button" onclick="generate()">
        ✦ Generate package
      </button>
    </div>
    <p class="footer-note">Local generator — no credits used. Copy each block into Suno / Midjourney / YouTube.</p>
  </div>

  <div class="toast" id="toast">Copied</div>

  <script>
    const IDEAS = {
      sleep: [
        "ultra-soft warm analog pads, rain on leaves, felt piano every 12 seconds, sleep-safe dynamics",
        "womb-like safety drone with distant owl and thin mist atmosphere",
        "overnight loopable meditation bed, no drums, no hooks, open midrange for DAW tones later",
      ],
      cortisol: [
        "cortisol flush ambient bed — 174 + 528 Hz designed for DAW stacking after render",
        "parasympathetic exhale pad swell, quiet field intro, seamless fade for long stitch",
        "nervous system downregulation soundscape, soft saturation, gentle tape haze",
      ],
      chamber: [
        "solo cello in an empty stone chamber, sparse violin harmonics, intimate silence",
        "dark neoclassical solitude, close-mic cello, slow 44 bpm, candlelit grit",
        "chamber of solitude — hyper-real cello and quiet piano, no percussion",
      ],
      neo: [
        "felt piano + soft strings, rainy window neoclassical, study-safe dynamics",
        "minimal chamber blend, warm minor key, long reverb tails",
        "neoclassical ambient mix for deep work — sparse, luminous, hand-finished",
      ],
      focus: [
        "minimal piano and soft pads for concentration, never distracting",
        "clean midrange focus flow, gentle pulse under 70 bpm, no vocals",
        "study sanctuary: quiet keys, distant rain, low drone bed",
      ],
      cosmic: [
        "deep space drift, ice-crystal pads, slow orbital bass bloom",
        "nebula hush with bow harmonics and stellar wind",
        "cinematic void ambient — vast, weightless, no drops",
      ],
    };

    const DNA = [
      { voice: "felt piano + sub-bass drone", texture: "tape warmth and forest rain", hue: "indigo and silver" },
      { voice: "bowed glass harmonics + analog pads", texture: "vinyl hush and distant wind", hue: "ember gold and charcoal" },
      { voice: "solo cello with long hall reverb", texture: "stone-room air and soft grit", hue: "candlelight and ink" },
      { voice: "warm analog pads only", texture: "soft saturation and tape haze", hue: "velvet blue and cream" },
    ];

    let mode = "full";
    let lastPack = null;

    document.querySelectorAll(".tab").forEach((tab) => {
      tab.addEventListener("click", () => {
        document.querySelectorAll(".tab").forEach((t) => t.classList.remove("active"));
        tab.classList.add("active");
        mode = tab.dataset.mode;
        if (lastPack) render(lastPack);
      });
    });

    function pick(arr) {
      return arr[Math.floor(Math.random() * arr.length)];
    }

    function surpriseIdea() {
      const vibe = document.getElementById("vibe").value;
      document.getElementById("idea").value = pick(IDEAS[vibe] || IDEAS.sleep);
    }

    function toast(msg) {
      const el = document.getElementById("toast");
      el.textContent = msg || "Copied";
      el.classList.add("show");
      setTimeout(() => el.classList.remove("show"), 1600);
    }

    function copy(text) {
      navigator.clipboard.writeText(text).then(() => toast("Copied"));
    }

    function runtimeLabel(v) {
      return ({ "8h": "8 hours", "3h": "3 hours", "1h": "1 hour", "8m": "about 8 minutes" }[v] || v);
    }

    function bpmFor(vibe) {
      return ({ sleep: 52, cortisol: 52, chamber: 44, neo: 56, focus: 68, cosmic: 50 })[vibe] || 52;
    }

    function buildPack() {
      const vibe = document.getElementById("vibe").value;
      const runtime = document.getElementById("runtime").value;
      const idea = (document.getElementById("idea").value || "").trim() || pick(IDEAS[vibe]);
      const dna = pick(DNA);
      const bpm = bpmFor(vibe);
      const duration = runtimeLabel(runtime);
      const titleSeed = idea.split(/[,.]/)[0].trim().slice(0, 42);

      const vibeName = {
        sleep: "Deep Sleep Sanctuary",
        cortisol: "Nervous System Reset",
        chamber: "Chamber of Solitude",
        neo: "Neoclassical Drift",
        focus: "Focus Sanctuary",
        cosmic: "Cosmic Meridian",
      }[vibe];

      const titles = [
        `${titleSeed || vibeName} — ${duration} of human-finished ambient`,
        `${vibeName}: Soft Drift for Rest · ${duration}`,
        `Velvet Hush · ${vibeName} (${duration})`,
        `${duration} of Quiet Light — ${vibeName}`,
        `Lumen Drift — ${vibeName} for overnight calm`,
      ];

      const tags = [
        "ambient music", "sleep music", "deep sleep", "meditation music",
        "focus music", "study music", "relaxing music", "no vocals",
        "instrumental ambient", "healing frequencies", "sleep sounds",
        "rain ambient", "calm music", "insomnia music", "nervous system",
        "lumen ai music", vibe.replace(/-/g, " "),
      ].join(", ");

      const sunoStyle = [
        `[Instrumental] [${vibeName}] [~${bpm} BPM]`,
        ``,
        `${idea}. ${dna.voice} as the primary voice. Texture: ${dna.texture}. Color feel: ${dna.hue}.`,
        ``,
        `Premium hand-curated ambient — seamless, no vocals, no drums, no percussion, no hooks, no drops, no sudden volume changes.`,
        `Dynamics stay quiet and sleep-safe. Long attacks, long releases. Designed for a ${duration} YouTube stitch.`,
        ``,
        `OPENING: soft field / atmosphere enters; primary voice arrives sparse; bed stays narrow.`,
        `BODY: pads evolve extremely slowly; occasional sparse accents 20–40 seconds apart; midrange left open for optional DAW tone beds later.`,
        `CLOSING: texture thins slightly, spacing widens, all elements hold for clean crossfade — no fade to silence inside the segment.`,
        ``,
        `Mood: womb-like safety, nervous-system downregulation, overnight loop safe.`,
        `Hard avoid: EDM, vocals, cinematic trailer energy, aggressive rock, sudden drops, beep tones, franchise references.`,
      ].join("\n");

      const sunoCustom = [
        "[Instrumental]",
        `[${vibeName}]`,
        "",
        idea,
        "",
        "No vocals. No drums. No percussion. No hooks. No drops.",
        "Keep dynamics narrow and sleep-safe.",
        "Leave midrange slightly open for optional frequency beds added later in DAW — do not generate sine beeps in the music.",
        `Structure for seamless ${runtime === "8m" ? "8-minute" : "long-form"} looping / crossfade stitching.`,
      ].join("\n");

      const coverArt = `Album cover art for an ambient music release titled "${titles[0]}". Dark indigo midnight (#0F1C2E) with soft gold light (#C9A227). Moody still-life: one candle, rain on glass, or sparse chamber instrument silhouette — no faces, no text, no logos, no arrows. Cinematic shallow depth of field, premium wellness aesthetic, painterly light. Square 1:1, high detail.`;

      const aiImage = `Cinematic ambient still for Lumen AI Music. ${idea}. Palette: deep indigo, charcoal, soft gold ember. Poetic night atmosphere, no people, no text, no watermarks. Photoreal meets painterly soft bloom.`;

      const videoBg = `16:9 seamless looping video background for a ${duration} YouTube ambient livestream. Slow camera drift, ${dna.hue} color grade, minimal motion, no flickering, no sudden cuts. Atmosphere matching: ${idea}. Soft grain, premium calm, forever-loop safe. No text, no faces, no UI.`;

      const thumb = `YouTube thumbnail, 1280x720. Giant readable emotion: quiet rest / soft reset. Huge soft-white or soft-gold keyword text area left clear (text added later in Canva). Background: ${idea.slice(0, 120)}. Dark indigo wash, one luminous accent, high contrast, no clutter, no faces, no arrows, no medical charts.`;

      const description = [
        `${titles[0]}`,
        ``,
        `Under a quiet meridian of light, this human-finished ambient sanctuary invites the body to soften and the mind to loosen its grip on the day.`,
        ``,
        idea.charAt(0).toUpperCase() + idea.slice(1) + ".",
        ``,
        `✧ Human-curated and finished with care`,
        `✧ Instrumental · no vocals`,
        `✧ Built for continuous listening (${duration})`,
        ``,
        `This is not medical advice — for relaxation and wellness listening only.`,
        ``,
        `Listen ad-free: https://lumenaimusic.com`,
        `Library: https://lumenaimusic.com/account`,
        ``,
        `Chapters / soft landmarks`,
        `0:00 Soft entry`,
        `— Drift body`,
        `— Quiet hold`,
        ``,
        `#ambient #sleepmusic #meditation #focusmusic #lumenaimusic`,
        ``,
        `Tags: ${tags}`,
      ].join("\n");

      const short30 = [
        `30-SECOND YOUTUBE SHORT`,
        ``,
        `Hook (0–3s): on-screen text — "Soft reset in 30 seconds"`,
        `Visual: tight crop of the video background, slow zoom.`,
        ``,
        `Beat (3–20s): play the softest bed from the track; overlay:`,
        `• "${vibeName}"`,
        `• "Human-finished ambient"`,
        `• "${duration} on the channel"`,
        ``,
        `Close (20–30s): CTA card → full video / lumenaimusic.com`,
        `Voiceover optional (whisper): "Let the noise leave. Stay for the quiet."`,
        ``,
        `Caption: ${titles[1]} ✧ Link in bio`,
      ].join("\n");

      return {
        sunoStyle,
        sunoCustom,
        coverArt,
        aiImage,
        videoBg,
        thumb,
        titles: titles.join("\n"),
        tags,
        description,
        short30,
        meta: { vibeName, duration },
      };
    }

    function blocksFor(pack) {
      const all = [
        { key: "sunoStyle", title: "Suno — Style", hint: "paste in Style box", text: pack.sunoStyle, modes: ["full", "suno"] },
        { key: "sunoCustom", title: "Suno — Custom / Lyrics", hint: "Instrumental ON", text: pack.sunoCustom, modes: ["full", "suno"] },
        { key: "coverArt", title: "Cover art prompt", hint: "Midjourney / Flux", text: pack.coverArt, modes: ["full", "visual"] },
        { key: "aiImage", title: "AI image prompt", hint: "general still", text: pack.aiImage, modes: ["full", "visual"] },
        { key: "videoBg", title: "Video background prompt", hint: "16:9 loop", text: pack.videoBg, modes: ["full", "visual"] },
        { key: "thumb", title: "Thumbnail prompt", hint: "leave text space", text: pack.thumb, modes: ["full", "visual"] },
        { key: "titles", title: "YouTube titles", hint: "pick one", text: pack.titles, modes: ["full", "youtube"] },
        { key: "description", title: "YouTube description", hint: "paste ready", text: pack.description, modes: ["full", "youtube"] },
        { key: "tags", title: "YouTube tags", hint: "comma list", text: pack.tags, modes: ["full", "youtube"] },
        { key: "short30", title: "30-second YouTube Short", hint: "script", text: pack.short30, modes: ["full", "youtube"] },
      ];
      return all.filter((b) => b.modes.includes(mode));
    }

    function render(pack) {
      const empty = document.getElementById("emptyState");
      const results = document.getElementById("results");
      const blocks = blocksFor(pack);
      empty.style.display = "none";
      results.classList.add("show");
      results.innerHTML = blocks.map((b, i) => `
        <article class="result-card">
          <header>
            <h3>${b.title}<span class="hint">${b.hint}</span></h3>
            <button class="copy-btn" type="button" data-i="${i}">Copy</button>
          </header>
          <pre id="block-${i}"></pre>
        </article>
      `).join("");
      blocks.forEach((b, i) => {
        document.getElementById(`block-${i}`).textContent = b.text;
      });
      results.querySelectorAll(".copy-btn").forEach((btn) => {
        btn.addEventListener("click", () => {
          const i = +btn.dataset.i;
          copy(blocks[i].text);
        });
      });
      document.getElementById("packCount").textContent = `${blocks.length} outputs · ${pack.meta.vibeName}`;
    }

    function generate() {
      lastPack = buildPack();
      render(lastPack);
      document.getElementById("stage").scrollIntoView({ behavior: "smooth", block: "start" });
      toast("Package ready");
    }

    // Seed a gentle default
    document.getElementById("idea").value = IDEAS.sleep[0];
  </script>
</body>
</html>
