<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lumen Studio</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,400&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #0c0c0e;
      --panel: #141418;
      --panel-2: #1c1c22;
      --border: rgba(255,255,255,0.08);
      --text: #f4f1ea;
      --muted: #8b8794;
      --gold: #c9a227;
      --orange: #e8923a;
      --side: 240px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      font-family: "DM Sans", system-ui, sans-serif;
      line-height: 1.5;
    }
    .app { display: flex; min-height: 100vh; }
    .sidebar {
      width: var(--side);
      flex-shrink: 0;
      border-right: 1px solid var(--border);
      background: #101014;
      padding: 1.25rem 0.85rem 2rem;
      position: sticky;
      top: 0;
      height: 100vh;
      overflow-y: auto;
    }
    .brand {
      padding: 0.35rem 0.75rem 1.25rem;
      border-bottom: 1px solid var(--border);
      margin-bottom: 1rem;
    }
    .brand h1 {
      font-family: "Instrument Serif", Georgia, serif;
      font-size: 1.55rem;
      font-weight: 400;
    }
    .brand h1 span { color: var(--gold); }
    .brand p { color: var(--muted); font-size: 0.72rem; margin-top: 0.2rem; letter-spacing: 0.04em; text-transform: uppercase; }
    .brand a { color: var(--muted); text-decoration: none; font-size: 0.78rem; display: inline-block; margin-top: 0.55rem; }
    .brand a:hover { color: var(--gold); }
    .nav-label {
      font-size: 0.65rem;
      font-weight: 600;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--muted);
      padding: 0.85rem 0.75rem 0.4rem;
    }
    .nav-btn {
      width: 100%;
      text-align: left;
      background: transparent;
      border: none;
      color: var(--muted);
      font: inherit;
      font-size: 0.86rem;
      padding: 0.55rem 0.75rem;
      border-radius: 10px;
      cursor: pointer;
      margin-bottom: 0.15rem;
    }
    .nav-btn:hover { background: rgba(255,255,255,0.04); color: var(--text); }
    .nav-btn.active {
      background: rgba(201,162,39,0.12);
      color: var(--text);
      box-shadow: inset 3px 0 0 var(--gold);
    }
    .main {
      flex: 1;
      min-width: 0;
      display: flex;
      flex-direction: column;
      padding: 1.5rem 1.5rem 7.5rem;
      max-width: 980px;
    }
    .main-top {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 1rem;
      margin-bottom: 1.25rem;
    }
    .main-top h2 {
      font-family: "Instrument Serif", Georgia, serif;
      font-size: clamp(1.8rem, 4vw, 2.6rem);
      font-weight: 400;
      letter-spacing: -0.02em;
      line-height: 1.15;
    }
    .main-top .desc { color: var(--muted); font-size: 0.9rem; margin-top: 0.4rem; max-width: 38rem; }
    .status { color: var(--muted); font-size: 0.82rem; white-space: nowrap; padding-top: 0.4rem; }
    .stage {
      flex: 1;
      border: 1px solid var(--border);
      border-radius: 18px;
      background: linear-gradient(180deg, rgba(255,255,255,0.02), transparent);
      min-height: 320px;
      overflow: hidden;
    }
    .empty {
      height: 100%;
      min-height: 320px;
      display: grid;
      place-items: center;
      text-align: center;
      color: var(--muted);
      padding: 2rem;
    }
    .empty .spark { letter-spacing: 0.4rem; opacity: 0.5; margin-bottom: 0.7rem; }
    .panel { display: none; padding: 1.15rem; }
    .panel.active { display: block; }
    .card {
      border: 1px solid var(--border);
      background: var(--panel);
      border-radius: 14px;
      overflow: hidden;
      margin-bottom: 0.85rem;
    }
    .card head, .card-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 0.75rem;
      padding: 0.8rem 1rem;
      border-bottom: 1px solid var(--border);
      background: rgba(255,255,255,0.02);
    }
    .card-head h3 { font-size: 0.88rem; font-weight: 600; }
    .card-head .hint { color: var(--muted); font-size: 0.72rem; font-weight: 400; margin-left: 0.35rem; }
    .copy-btn, .pill, .generate, .wand, .nav-btn, .tab-x {
      font-family: inherit;
    }
    .copy-btn {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text);
      border-radius: 999px;
      padding: 0.35rem 0.8rem;
      font-size: 0.75rem;
      font-weight: 600;
      cursor: pointer;
    }
    .copy-btn:hover { border-color: var(--gold); color: var(--gold); }
    pre.out {
      padding: 1rem;
      white-space: pre-wrap;
      word-break: break-word;
      font-family: ui-monospace, Consolas, monospace;
      font-size: 0.78rem;
      line-height: 1.55;
      color: #e8e4dc;
      max-height: 420px;
      overflow-y: auto;
    }
    .tools {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 0.6rem;
      margin-bottom: 1rem;
    }
    .tool {
      border: 1px solid var(--border);
      background: var(--panel);
      border-radius: 12px;
      padding: 0.85rem;
      text-decoration: none;
      color: inherit;
      transition: border-color 0.15s;
    }
    .tool:hover { border-color: rgba(201,162,39,0.45); }
    .tool strong { display: block; font-size: 0.88rem; margin-bottom: 0.2rem; }
    .tool span { color: var(--muted); font-size: 0.74rem; }
    .tool .badge {
      display: inline-block;
      margin-top: 0.45rem;
      font-size: 0.65rem;
      font-weight: 600;
      color: var(--gold);
      border: 1px solid rgba(201,162,39,0.35);
      border-radius: 999px;
      padding: 0.15rem 0.45rem;
    }
    .steps-list {
      list-style: none;
      counter-reset: step;
      margin: 0.5rem 0 1rem;
    }
    .steps-list li {
      counter-increment: step;
      position: relative;
      padding: 0.75rem 0.85rem 0.75rem 2.6rem;
      border: 1px solid var(--border);
      border-radius: 12px;
      background: var(--panel);
      margin-bottom: 0.5rem;
      font-size: 0.86rem;
      color: #d8d4cc;
    }
    .steps-list li::before {
      content: counter(step);
      position: absolute;
      left: 0.75rem;
      top: 0.75rem;
      width: 1.35rem;
      height: 1.35rem;
      border-radius: 50%;
      background: rgba(201,162,39,0.18);
      color: var(--gold);
      font-size: 0.72rem;
      font-weight: 700;
      display: grid;
      place-items: center;
    }
    .composer {
      position: fixed;
      left: calc(var(--side) + (100% - var(--side)) / 2);
      transform: translateX(-50%);
      bottom: 1rem;
      width: min(920px, calc(100% - var(--side) - 2rem));
      background: rgba(20,20,24,0.94);
      backdrop-filter: blur(16px);
      border: 1px solid var(--border);
      border-radius: 22px;
      padding: 0.95rem 1rem;
      box-shadow: 0 18px 50px rgba(0,0,0,0.5);
      z-index: 40;
    }
    .composer-row {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 0.65rem;
      align-items: start;
    }
    #idea {
      width: 100%;
      min-height: 52px;
      max-height: 120px;
      resize: vertical;
      background: transparent;
      border: none;
      color: var(--text);
      font: inherit;
      font-size: 0.94rem;
      outline: none;
      padding: 0.55rem 0.15rem;
    }
    #idea::placeholder { color: var(--muted); }
    .wand {
      width: 42px;
      height: 42px;
      border-radius: 50%;
      border: none;
      background: var(--orange);
      color: #fff;
      font-size: 1.05rem;
      cursor: pointer;
      margin-top: 0.25rem;
      box-shadow: 0 8px 22px rgba(232,146,58,0.35);
    }
    .controls {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
      align-items: center;
      margin-top: 0.7rem;
    }
    .pill {
      appearance: none;
      background: var(--panel-2);
      border: 1px solid var(--border);
      color: var(--text);
      border-radius: 999px;
      padding: 0.5rem 0.85rem;
      font-size: 0.8rem;
      cursor: pointer;
    }
    .spacer { flex: 1; }
    .generate {
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,0.12);
      background: linear-gradient(180deg, rgba(255,255,255,0.14), rgba(255,255,255,0.05));
      color: var(--text);
      padding: 0.65rem 1.1rem;
      font-size: 0.88rem;
      font-weight: 600;
      cursor: pointer;
    }
    .generate:hover {
      border-color: rgba(201,162,39,0.5);
      background: linear-gradient(180deg, rgba(201,162,39,0.35), rgba(201,162,39,0.15));
    }
    .footer-note {
      margin-top: 0.55rem;
      text-align: center;
      color: var(--muted);
      font-size: 0.72rem;
    }
    .toast {
      position: fixed;
      left: 50%;
      bottom: 8.5rem;
      transform: translateX(-50%) translateY(6px);
      background: var(--gold);
      color: #1a1408;
      font-weight: 600;
      font-size: 0.8rem;
      padding: 0.5rem 0.95rem;
      border-radius: 999px;
      opacity: 0;
      pointer-events: none;
      transition: 0.2s;
      z-index: 50;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
    .mobile-nav {
      display: none;
      gap: 0.35rem;
      overflow-x: auto;
      padding-bottom: 0.75rem;
      margin-bottom: 0.5rem;
    }
    .mobile-nav button {
      flex-shrink: 0;
      white-space: nowrap;
      border-radius: 999px;
      border: 1px solid var(--border);
      background: var(--panel);
      color: var(--muted);
      padding: 0.4rem 0.75rem;
      font-size: 0.75rem;
      cursor: pointer;
    }
    .mobile-nav button.active { color: var(--text); border-color: rgba(201,162,39,0.45); background: rgba(201,162,39,0.12); }
    @media (max-width: 860px) {
      .sidebar { display: none; }
      .mobile-nav { display: flex; }
      .composer {
        left: 50%;
        width: min(920px, calc(100% - 1.25rem));
      }
      .main { padding: 1rem 1rem 8rem; }
    }
  </style>
</head>
<body>
  <div class="app">
    <aside class="sidebar">
      <div class="brand">
        <h1>Lumen <span>Studio</span></h1>
        <p>Prompt sanctuary</p>
        <a href="/account">← Library</a>
      </div>

      <div class="nav-label">Create</div>
      <button class="nav-btn active" data-nav="all" type="button">All outputs</button>
      <button class="nav-btn" data-nav="shorts" type="button">YouTube Shorts</button>

      <div class="nav-label">Suno</div>
      <button class="nav-btn" data-nav="sunoStyle" type="button">Style prompt</button>
      <button class="nav-btn" data-nav="sunoCustom" type="button">Custom / lyrics</button>

      <div class="nav-label">Visuals</div>
      <button class="nav-btn" data-nav="coverArt" type="button">Cover art</button>
      <button class="nav-btn" data-nav="aiImage" type="button">AI image</button>
      <button class="nav-btn" data-nav="videoBg" type="button">Video background</button>
      <button class="nav-btn" data-nav="thumb" type="button">Thumbnail</button>

      <div class="nav-label">YouTube long-form</div>
      <button class="nav-btn" data-nav="titles" type="button">Titles</button>
      <button class="nav-btn" data-nav="description" type="button">Description</button>
      <button class="nav-btn" data-nav="tags" type="button">Tags</button>
    </aside>

    <main class="main">
      <div class="mobile-nav" id="mobileNav"></div>

      <div class="main-top">
        <div>
          <h2 id="viewTitle">All outputs</h2>
          <p class="desc" id="viewDesc">Generate once, then open each section from the sidebar.</p>
        </div>
        <div class="status" id="packCount">Ready</div>
      </div>

      <div class="stage" id="stage">
        <div class="empty" id="emptyState">
          <div>
            <div class="spark">✦ ✦ ✦</div>
            <p>Your generations will appear here.</p>
          </div>
        </div>

        <div class="panel" id="panel-all"></div>
        <div class="panel" id="panel-sunoStyle"></div>
        <div class="panel" id="panel-sunoCustom"></div>
        <div class="panel" id="panel-coverArt"></div>
        <div class="panel" id="panel-aiImage"></div>
        <div class="panel" id="panel-videoBg"></div>
        <div class="panel" id="panel-thumb"></div>
        <div class="panel" id="panel-titles"></div>
        <div class="panel" id="panel-description"></div>
        <div class="panel" id="panel-tags"></div>
        <div class="panel" id="panel-shorts"></div>
      </div>
    </main>
  </div>

  <div class="composer">
    <div class="composer-row">
      <textarea id="idea" rows="2" placeholder="Describe the sound or scene — soft rain, warm pads, dreamy bedroom sanctuary…"></textarea>
      <button class="wand" type="button" title="Surprise idea" onclick="surpriseIdea()">✧</button>
    </div>
    <div class="controls">
      <select class="pill" id="vibe">
        <option value="sleep">Deep sleep</option>
        <option value="cortisol">Nervous system reset</option>
        <option value="chamber">Dark chamber · cello</option>
        <option value="neo">Neoclassical</option>
        <option value="focus">Focus / study</option>
        <option value="cosmic">Cosmic ambient</option>
        <option value="shortsGirl">Shorts · dreamy rest girl</option>
      </select>
      <select class="pill" id="runtime">
        <option value="8h">8 hour video</option>
        <option value="3h">3 hour video</option>
        <option value="1h">1 hour video</option>
        <option value="8m">~8 min segment</option>
        <option value="30s">30s Short</option>
      </select>
      <select class="pill" id="motionTool">
        <option value="kling">Kling 3.0 (top pick)</option>
        <option value="runway">Runway Gen-4</option>
        <option value="luma">Luma Ray3</option>
        <option value="pika">Pika 2.2/2.5</option>
      </select>
      <div class="spacer"></div>
      <button class="generate" type="button" onclick="generate()">✦ Generate</button>
    </div>
    <p class="footer-note">Local generator · Flux still → Kling / Runway / Luma → CapCut for Shorts</p>
  </div>

  <div class="toast" id="toast">Copied</div>

  <script>
    const NAV = [
      { id: "all", label: "All outputs", title: "All outputs", desc: "Every prompt in one place. Use the sidebar to focus." },
      { id: "shorts", label: "YouTube Shorts", title: "YouTube Shorts", desc: "Base still → image-to-video shots → CapCut text/end card. Hybrid workflow." },
      { id: "sunoStyle", label: "Style prompt", title: "Suno — Style", desc: "Paste into Suno Style of Music." },
      { id: "sunoCustom", label: "Custom / lyrics", title: "Suno — Custom", desc: "Instrumental ON. Paste into Custom / Lyrics." },
      { id: "coverArt", label: "Cover art", title: "Cover art prompt", desc: "Square release art — Flux / Midjourney." },
      { id: "aiImage", label: "AI image", title: "AI image prompt", desc: "General still for branding or B-roll." },
      { id: "videoBg", label: "Video background", title: "Video background", desc: "16:9 seamless loop for long-form." },
      { id: "thumb", label: "Thumbnail", title: "Thumbnail prompt", desc: "1280×720 with text space for Canva." },
      { id: "titles", label: "Titles", title: "YouTube titles", desc: "Pick one strong title." },
      { id: "description", label: "Description", title: "YouTube description", desc: "Paste-ready description." },
      { id: "tags", label: "Tags", title: "YouTube tags", desc: "Comma-separated tags." },
    ];

    const IDEAS = {
      sleep: ["ultra-soft warm analog pads, rain on leaves, felt piano every 12 seconds, sleep-safe dynamics"],
      cortisol: ["cortisol flush ambient bed — soft pads only; Hz tones added later in DAW"],
      chamber: ["solo cello in an empty stone chamber, sparse violin harmonics, intimate silence"],
      neo: ["felt piano + soft strings, rainy window neoclassical, study-safe dynamics"],
      focus: ["minimal piano and soft pads for concentration, never distracting"],
      cosmic: ["deep space drift, ice-crystal pads, slow orbital bass bloom"],
      shortsGirl: ["serene rest sanctuary with soft sage, cream, candlelight — calm new age mood"],
    };

    const DNA = [
      { voice: "felt piano + sub-bass drone", texture: "tape warmth and forest rain", hue: "indigo and silver" },
      { voice: "bowed glass harmonics + analog pads", texture: "vinyl hush and distant wind", hue: "ember gold and charcoal" },
      { voice: "solo cello with long hall reverb", texture: "stone-room air and soft grit", hue: "candlelight and ink" },
      { voice: "warm analog pads only", texture: "soft saturation and tape haze", hue: "sage green cream mist white" },
    ];

    let view = "all";
    let pack = null;

    const mobileNav = document.getElementById("mobileNav");
    mobileNav.innerHTML = NAV.map((n) =>
      `<button type="button" data-nav="${n.id}" class="${n.id === "all" ? "active" : ""}">${n.label}</button>`
    ).join("");

    function setView(id) {
      view = id;
      const meta = NAV.find((n) => n.id === id) || NAV[0];
      document.getElementById("viewTitle").textContent = meta.title;
      document.getElementById("viewDesc").textContent = meta.desc;
      document.querySelectorAll(".nav-btn, .mobile-nav button").forEach((btn) => {
        btn.classList.toggle("active", btn.dataset.nav === id);
      });
      document.querySelectorAll(".panel").forEach((p) => p.classList.remove("active"));
      document.getElementById("emptyState").style.display = pack ? "none" : "grid";
      if (pack) {
        const panel = document.getElementById(`panel-${id}`);
        if (panel) panel.classList.add("active");
      }
    }

    document.querySelectorAll(".nav-btn, .mobile-nav").forEach((el) => {
      el.addEventListener("click", (e) => {
        const btn = e.target.closest("[data-nav]");
        if (!btn) return;
        setView(btn.dataset.nav);
      });
    });

    function pick(arr) { return arr[Math.floor(Math.random() * arr.length)]; }

    function surpriseIdea() {
      const vibe = document.getElementById("vibe").value;
      document.getElementById("idea").value = pick(IDEAS[vibe] || IDEAS.sleep);
    }

    function toast(msg) {
      const t = document.getElementById("toast");
      t.textContent = msg || "Copied";
      t.classList.add("show");
      setTimeout(() => t.classList.remove("show"), 1500);
    }

    function copy(text) {
      navigator.clipboard.writeText(text).then(() => toast("Copied"));
    }

    function runtimeLabel(v) {
      return ({ "8h": "8 Hours", "3h": "3 Hours", "1h": "1 Hour", "8m": "~8 min", "30s": "30 seconds" }[v] || v);
    }

    function bpmFor(vibe) {
      return ({ sleep: 52, cortisol: 52, chamber: 44, neo: 56, focus: 68, cosmic: 50, shortsGirl: 52 })[vibe] || 52;
    }

    function motionTips(tool) {
      const map = {
        kling: "Kling 3.0 / Omni — best balance. Use Elements for character lock. Generate 5–8s clips.",
        runway: "Runway Gen-4 / 4.5 — strongest camera control. Keep motion subtle.",
        luma: "Luma Ray3 — dreamy atmospheric look. Great for mood beds.",
        pika: "Pika 2.2/2.5 — fast cheap Shorts iterations.",
      };
      return map[tool] || map.kling;
    }

    function buildPack() {
      const vibe = document.getElementById("vibe").value;
      const runtime = document.getElementById("runtime").value;
      const tool = document.getElementById("motionTool").value;
      const idea = (document.getElementById("idea").value || "").trim() || pick(IDEAS[vibe]);
      const dna = pick(DNA);
      const bpm = bpmFor(vibe);
      const duration = runtimeLabel(runtime);
      const titleSeed = idea.split(/[,.]/)[0].trim().slice(0, 40);

      const vibeName = {
        sleep: "Deep Sleep Sanctuary",
        cortisol: "Nervous System Reset",
        chamber: "Chamber of Solitude",
        neo: "Neoclassical Drift",
        focus: "Focus Sanctuary",
        cosmic: "Cosmic Meridian",
        shortsGirl: "Sleeping Compass",
      }[vibe];

      const seriesHook = vibe === "shortsGirl" ? "Dusk in sound" : "Soft reset";
      const brandLine = "Lumen AI Music";

      const titles = [
        `${titleSeed || vibeName} — ${duration} of human-finished ambient`,
        `${vibeName}: Soft Drift for Rest · ${duration}`,
        `Velvet Hush · ${vibeName} (${duration})`,
        `${duration} of Quiet Light — ${vibeName}`,
        `Lumen Drift — ${vibeName} for overnight calm`,
      ];

      const tags = [
        "ambient music", "sleep music", "deep sleep", "meditation music",
        "focus music", "youtube shorts", "relaxing music", "no vocals",
        "instrumental ambient", "sleep sounds", "calm music",
        "lumen ai music", vibe.replace(/-/g, " "),
      ].join(", ");

      const sunoStyle = [
        `[Instrumental] [${vibeName}] [~${bpm} BPM]`,
        ``,
        `${idea}. ${dna.voice} as the primary voice. Texture: ${dna.texture}. Color feel: ${dna.hue}.`,
        ``,
        `Premium hand-curated ambient — seamless, no vocals, no drums, no percussion, no hooks, no drops, no sudden volume changes.`,
        `Dynamics stay quiet and sleep-safe. Long attacks, long releases. Designed for ${duration} playback.`,
        ``,
        `OPENING: soft field enters; primary voice sparse; bed narrow.`,
        `BODY: extremely slow pad evolution; sparse accents 20–40s apart; midrange open for optional DAW tone beds later.`,
        `CLOSING: texture thins, spacing widens, hold for clean crossfade.`,
        ``,
        `Hard avoid: EDM, vocals, trailer energy, aggressive rock, sudden drops, sine beeps, franchise names.`,
      ].join("\n");

      const sunoCustom = [
        "[Instrumental]",
        `[${vibeName}]`,
        "",
        idea,
        "",
        "No vocals. No drums. No percussion. No hooks. No drops.",
        "Narrow sleep-safe dynamics.",
        "Do not generate beep/sine healing tones inside the music — add those later in DAW if needed.",
      ].join("\n");

      const coverArt = `Album cover for "${titles[0]}". Midnight indigo (#0F1C2E) + soft gold (#C9A227). Moody still-life or serene atmosphere, no faces required unless shortsGirl vibe, no text, no logos, no arrows. Square 1:1, premium wellness cinematic light.`;

      const faceStill = `Serene young woman lying in bed with eyes gently closed and peaceful soft smile, wearing over-ear headphones, cozy dreamy bedroom sanctuary, soft textiles and blankets, plants, warm candlelight bokeh, gentle cinematic lighting, soft sage green + cream + mist white color palette, tranquil new age atmosphere, highly detailed, photorealistic, soft focus, vertical 9:16 composition --ar 9:16`;

      const roomStill = `Same woman and bedroom as previous still for consistency — medium wider shot showing the full cozy bed, plants, soft textiles, warm lamp and candle bokeh, peaceful dreamy sanctuary, soft sage cream mist white palette, photoreal cinematic, vertical 9:16 --ar 9:16`;

      const aiImage = vibe === "shortsGirl"
        ? faceStill
        : `Cinematic ambient still for Lumen AI Music. ${idea}. Deep indigo, charcoal, soft gold ember. No people required, no text, no watermarks. Vertical optional if used for Shorts.`;

      const videoBg = `16:9 seamless looping video background for a ${duration} ambient YouTube video. Slow camera drift, ${dna.hue} grade, minimal motion, no flicker, no cuts. Matching: ${idea}. Soft grain, forever-loop safe. No text, no faces, no UI.`;

      const thumb = `YouTube thumbnail 1280x720. Soft-white/gold keyword zone left clear for Canva text. Background: ${idea.slice(0, 110)}. Dark indigo wash, one luminous accent, high contrast, no clutter, no arrows, no medical charts.`;

      const description = [
        titles[0],
        ``,
        `Under a quiet meridian of light, this human-finished ambient sanctuary invites the body to soften.`,
        ``,
        idea.charAt(0).toUpperCase() + idea.slice(1) + ".",
        ``,
        `✧ Human-curated and finished with care`,
        `✧ Instrumental · no vocals`,
        `✧ Built for continuous listening (${duration})`,
        ``,
        `Not medical advice — relaxation and wellness only.`,
        ``,
        `Listen ad-free: https://lumenaimusic.com`,
        `Library: https://lumenaimusic.com/account`,
        ``,
        `#ambient #sleepmusic #meditation #lumenaimusic`,
      ].join("\n");

      const i2vHook = `Very slow subtle zoom in on her peaceful face, eyes closed, gentle serene smile, soft breathing, warm gentle lighting, calm cinematic movement`;
      const i2vPull = `Slow smooth camera pull-back revealing the full cozy bed, plants, soft textiles and warm lamp light with candle bokeh in background, peaceful dreamy atmosphere, gentle calm motion`;
      const i2vBreath = `Medium shot, very subtle slow head sinking deeper into pillow, gentle deep breath, peaceful blissful expression, slow calm cinematic breathing motion, soft shadows`;

      const shortsKit = [
        `═══════════════════════════════`,
        `YOUTUBE SHORTS — LUMEN WORKFLOW`,
        `═══════════════════════════════`,
        ``,
        `Tool stack`,
        `• Still: Flux (Fal / OpenArt / Replicate) or Midjourney / Kling image`,
        `• Motion: ${motionTips(tool)}`,
        `• Edit: CapCut (free) — 1080×1920`,
        `• Hybrid: still → animate key motion → polish + text in CapCut`,
        ``,
        `─────────────────`,
        `STEP 1 — Base stills (most important)`,
        `Generate 2–3 versions: close-up face (hook) + medium/wider room.`,
        ``,
        `CLOSE-UP (Flux / MJ):`,
        faceStill,
        ``,
        `WIDER ROOM (same character refs):`,
        roomStill,
        ``,
        `─────────────────`,
        `STEP 2 — Image-to-video (same reference image across shots)`,
        ``,
        `Shot 1 · 0:00–0:03 · Close-up hook`,
        i2vHook,
        ``,
        `Shot 2 · 0:03–0:12 · Slow pull-back`,
        i2vPull,
        ``,
        `Shot 3 · 0:12–0:22 · Subtle human movement`,
        i2vBreath,
        ``,
        `Tips: “slow cinematic camera movement”, “very subtle”, “calm peaceful motion”.`,
        `Generate 5–8 second clips, then trim.`,
        ``,
        `─────────────────`,
        `STEP 3 — CapCut text + end card`,
        `0–3s: “${seriesHook}”`,
        `0:22–0:28: “${vibeName.toUpperCase()}” + “${duration} · Golden Hour”`,
        `End card: “Full ${duration} → ${brandLine}” + subtle logo`,
        `Export 1080×1920 vertical. Soft sage + cream grade if needed.`,
        ``,
        `─────────────────`,
        `STEP 4 — Audio`,
        `Trim master WAV to the most immersive ~30s (opening pad wash).`,
        `Sync in CapCut.`,
        ``,
        `─────────────────`,
        `SHORT CAPTION / HOOK SCRIPT`,
        `Hook: ${seriesHook}`,
        `Body: ${vibeName} · human-finished ambient`,
        `CTA: Full ${duration} on Lumen AI Music → lumenaimusic.com`,
        `Caption: ${titles[1]} ✧ Link in bio`,
        ``,
        `Thumbnail tip: use the close-up face frame (0–3s).`,
      ].join("\n");

      return {
        sunoStyle,
        sunoCustom,
        coverArt,
        aiImage,
        videoBg,
        thumb,
        titles: titles.join("\n"),
        description,
        tags,
        shortsKit,
        shortsParts: {
          faceStill,
          roomStill,
          i2vHook,
          i2vPull,
          i2vBreath,
          capcut: [
            `0–3s text: “${seriesHook}”`,
            `0:22–0:28: “${vibeName.toUpperCase()}” + “${duration} · Golden Hour”`,
            `End: “Full ${duration} → ${brandLine}”`,
            `Export: 1080×1920`,
          ].join("\n"),
        },
        meta: { vibeName, duration, tool },
      };
    }

    function card(title, hint, text, id) {
      return `
        <article class="card">
          <div class="card-head">
            <h3>${title}<span class="hint">${hint || ""}</span></h3>
            <button class="copy-btn" type="button" data-copy="${id}">Copy</button>
          </div>
          <pre class="out" id="${id}"></pre>
        </article>`;
    }

    function bindCopies(root) {
      root.querySelectorAll("[data-copy]").forEach((btn) => {
        btn.onclick = () => {
          const el = document.getElementById(btn.dataset.copy);
          copy(el ? el.textContent : "");
        };
      });
    }

    function fill(id, text) {
      const el = document.getElementById(id);
      if (el) el.textContent = text;
    }

    function render() {
      if (!pack) return;
      document.getElementById("emptyState").style.display = "none";

      const all = document.getElementById("panel-all");
      all.innerHTML = [
        card("Suno — Style", "Style box", "", "all-sunoStyle"),
        card("Suno — Custom", "Instrumental ON", "", "all-sunoCustom"),
        card("Cover art", "1:1", "", "all-coverArt"),
        card("AI image", "still", "", "all-aiImage"),
        card("Video background", "16:9", "", "all-videoBg"),
        card("Thumbnail", "1280×720", "", "all-thumb"),
        card("YouTube titles", "pick one", "", "all-titles"),
        card("YouTube description", "", "", "all-description"),
        card("YouTube tags", "", "", "all-tags"),
        card("YouTube Shorts kit", "full workflow", "", "all-shorts"),
      ].join("");
      fill("all-sunoStyle", pack.sunoStyle);
      fill("all-sunoCustom", pack.sunoCustom);
      fill("all-coverArt", pack.coverArt);
      fill("all-aiImage", pack.aiImage);
      fill("all-videoBg", pack.videoBg);
      fill("all-thumb", pack.thumb);
      fill("all-titles", pack.titles);
      fill("all-description", pack.description);
      fill("all-tags", pack.tags);
      fill("all-shorts", pack.shortsKit);
      bindCopies(all);

      const singles = [
        ["sunoStyle", "Suno — Style", "paste in Style box", pack.sunoStyle],
        ["sunoCustom", "Suno — Custom", "Instrumental ON", pack.sunoCustom],
        ["coverArt", "Cover art", "Flux / Midjourney", pack.coverArt],
        ["aiImage", "AI image", "general still", pack.aiImage],
        ["videoBg", "Video background", "16:9 loop", pack.videoBg],
        ["thumb", "Thumbnail", "leave text space", pack.thumb],
        ["titles", "YouTube titles", "pick one", pack.titles],
        ["description", "YouTube description", "paste ready", pack.description],
        ["tags", "YouTube tags", "comma list", pack.tags],
      ];
      singles.forEach(([key, title, hint, text]) => {
        const panel = document.getElementById(`panel-${key}`);
        panel.innerHTML = card(title, hint, "", `solo-${key}`);
        fill(`solo-${key}`, text);
        bindCopies(panel);
      });

      const shorts = document.getElementById("panel-shorts");
      shorts.innerHTML = `
        <div class="tools">
          <a class="tool" href="https://fal.ai" target="_blank" rel="noopener"><strong>Flux via Fal</strong><span>Best still consistency</span><div class="badge">Step 1</div></a>
          <a class="tool" href="https://kling.ai" target="_blank" rel="noopener"><strong>Kling 3.0</strong><span>Top image-to-video pick</span><div class="badge">Step 2</div></a>
          <a class="tool" href="https://runwayml.com" target="_blank" rel="noopener"><strong>Runway Gen-4</strong><span>Camera precision</span><div class="badge">Alt</div></a>
          <a class="tool" href="https://lumalabs.ai" target="_blank" rel="noopener"><strong>Luma Ray3</strong><span>Dreamy mood</span><div class="badge">Alt</div></a>
          <a class="tool" href="https://pika.art" target="_blank" rel="noopener"><strong>Pika</strong><span>Fast Shorts iterates</span><div class="badge">Alt</div></a>
          <a class="tool" href="https://www.capcut.com" target="_blank" rel="noopener"><strong>CapCut</strong><span>Text + export 9:16</span><div class="badge">Step 3</div></a>
        </div>
        <ul class="steps-list">
          <li><strong>Generate strong stills</strong> — close-up hook + wider room. Lock character consistency.</li>
          <li><strong>Animate in ${pack.meta.tool}</strong> — 3 shots, 5–8s each, very subtle motion.</li>
          <li><strong>CapCut</strong> — text overlays + end card, export 1080×1920.</li>
          <li><strong>Audio</strong> — trim your Suno/master WAV to the best ~30s bed.</li>
        </ul>
        ${card("Full Shorts kit", motionTips(pack.meta.tool), "", "shorts-full")}
        ${card("Still — close-up", "Flux / MJ · 9:16", "", "shorts-face")}
        ${card("Still — wider room", "same character", "", "shorts-room")}
        ${card("I2V · Shot 1 hook", "0:00–0:03", "", "shorts-s1")}
        ${card("I2V · Shot 2 pull-back", "0:03–0:12", "", "shorts-s2")}
        ${card("I2V · Shot 3 breath", "0:12–0:22", "", "shorts-s3")}
        ${card("CapCut text sheet", "end card too", "", "shorts-capcut")}
      `;
      fill("shorts-full", pack.shortsKit);
      fill("shorts-face", pack.shortsParts.faceStill);
      fill("shorts-room", pack.shortsParts.roomStill);
      fill("shorts-s1", pack.shortsParts.i2vHook);
      fill("shorts-s2", pack.shortsParts.i2vPull);
      fill("shorts-s3", pack.shortsParts.i2vBreath);
      fill("shorts-capcut", pack.shortsParts.capcut);
      bindCopies(shorts);

      document.getElementById("packCount").textContent =
        `${pack.meta.vibeName} · ${pack.meta.duration}`;
      setView(view);
    }

    function generate() {
      pack = buildPack();
      if (document.getElementById("vibe").value === "shortsGirl" && view === "all") {
        view = "shorts";
      }
      render();
      toast("Package ready");
    }

    document.getElementById("idea").value = IDEAS.sleep[0];
    setView("all");
  </script>
</body>
</html>
